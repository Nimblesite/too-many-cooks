name: Release

# Tag → release. The tagged SHA is built verbatim: NO branch detection, NO
# commit, NO push, NO tag mutation. Version is stamped runner-local from the tag
# in each build job. [CI-RELEASE]
#
# Shape: build jobs produce ARTIFACTS only (never touch the GitHub release);
# one github-release job creates the release from those artifacts (no parallel
# softprops race); the registry publish jobs consume the same VSIX artifact so
# identical bytes ship everywhere.

on:
  push:
    tags:
      - 'v*'

# Least-privilege default: every job is read-only unless it explicitly escalates
# (github-release needs contents: write; OIDC jobs need id-token: write).
# [SWR-SEC-TOKEN-PRIVILEGE]
permissions:
  contents: read

jobs:
  # CodeQL release gate ([GITHUB-CODE-SCANNING]). Scans the tagged SHA with the
  # current query set and FAILS on any High/Critical finding. Both build jobs and
  # deploy-website `needs:` this (the registry publishes transitively via
  # build-vsix), so a dirty scan BLOCKS the release — code CodeQL flagged can
  # never ship. Reuses codeql.yml via workflow_call (DRY — no duplicated matrix).
  codeql:
    name: CodeQL release gate
    permissions:
      security-events: write
      actions: read
      contents: read
    uses: ./.github/workflows/codeql.yml
    with:
      gate: true

  build-mcp:
    name: Build & Publish npm Packages
    runs-on: ubuntu-latest
    needs: codeql
    environment: NPM Deployment
    permissions:
      contents: read
      id-token: write # npm Trusted Publisher (OIDC) — no NPM_TOKEN
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: too-many-cooks/package-lock.json

      - name: Upgrade npm to >= 11.5 (Trusted Publisher OIDC auth)
        run: npm install -g npm@latest

      - name: Install dependencies
        working-directory: too-many-cooks
        run: npm ci

      - name: Build all packages
        working-directory: too-many-cooks
        run: npm run build

      - name: Verify server binary
        run: |
          set -e
          test -f too-many-cooks/packages/too-many-cooks/build/bin/server.js || (echo "Server build failed!" && exit 1)
          echo "MCP server built successfully"

      - name: Verify core build
        run: |
          set -e
          test -f too-many-cooks/packages/core/build/index.js || (echo "Core build failed!" && exit 1)
          echo "Core package built successfully"

      - name: Set version and npm tag from git tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NPM_TAG=latest
          if [[ "$VERSION" == *-* ]]; then NPM_TAG=beta; fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "NPM_TAG=$NPM_TAG" >> "$GITHUB_OUTPUT"

      # First-class package.json mutation via `npm version` / `npm pkg set` — no
      # ad hoc sed on a structured file. [SWR-VERSION-BUILD-STAMPING]
      - name: Stamp versions for publishing
        run: |
          set -euo pipefail
          VERSION=${{ steps.version.outputs.VERSION }}
          cd too-many-cooks/packages/core
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          cd ../too-many-cooks
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npm pkg set "dependencies.too-many-cooks-core=^$VERSION"

      - name: Publish too-many-cooks-core to npm
        working-directory: too-many-cooks/packages/core
        run: npm publish --tag ${{ steps.version.outputs.NPM_TAG }} --provenance --access public

      - name: Publish too-many-cooks to npm
        working-directory: too-many-cooks/packages/too-many-cooks
        run: npm publish --tag ${{ steps.version.outputs.NPM_TAG }} --provenance --access public

      - name: Pack core tarball
        working-directory: too-many-cooks/packages/core
        run: npm pack

      - name: Pack MCP server tarball
        working-directory: too-many-cooks/packages/too-many-cooks
        run: npm pack

      - name: Upload npm tarballs as artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-tarballs
          path: |
            too-many-cooks/packages/core/too-many-cooks-core-${{ steps.version.outputs.VERSION }}.tgz
            too-many-cooks/packages/too-many-cooks/too-many-cooks-${{ steps.version.outputs.VERSION }}.tgz
          if-no-files-found: error

  # Build the VSIX exactly once and publish it as an artifact. The github-release,
  # Marketplace and Open VSX jobs consume that SAME artifact, so identical bytes
  # ship everywhere. The extension bundles NO native binaries (pure JS that talks
  # to the MCP server over HTTP), so a single universal VSIX is correct — no
  # per-target build, and no dependency on build-mcp.
  build-vsix:
    name: Build VSCode Extension
    runs-on: ubuntu-latest
    needs: codeql
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: too_many_cooks_vscode_extension/package-lock.json

      - name: Install extension dependencies
        working-directory: too_many_cooks_vscode_extension
        run: npm ci

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # vsce is version-pinned: a floating `npx @vscode/vsce` would fetch and run
      # the latest release at package time — a supply-chain risk. Bump deliberately.
      - name: Package VSCode extension
        working-directory: too_many_cooks_vscode_extension
        run: |
          set -euo pipefail
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --allow-same-version
          npx --yes @vscode/vsce@3.9.2 package --out "too-many-cooks-${{ steps.version.outputs.VERSION }}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vsix
          path: too_many_cooks_vscode_extension/too-many-cooks-${{ steps.version.outputs.VERSION }}.vsix
          if-no-files-found: error

  # Single owner of the GitHub release — no parallel softprops race. Creates the
  # release once from the build artifacts (npm tarballs + VSIX).
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-mcp
      - build-vsix
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release with all assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          # Recursive globs: upload-artifact roots a multi-path artifact at the
          # least-common-ancestor of its inputs, so the two npm tarballs download
          # one directory deep (artifacts/core/*.tgz, artifacts/too-many-cooks/*.tgz).
          # A non-recursive artifacts/*.tgz would silently match neither. **/* also
          # matches the flat single-file VSIX. fail_on_unmatched_files makes a future
          # layout drift FAIL loudly instead of shipping a release missing assets.
          files: |
            artifacts/**/*.tgz
            artifacts/**/*.vsix
          fail_on_unmatched_files: true
          name: Too Many Cooks ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-marketplace:
    name: Publish VSIX to VS Code Marketplace
    runs-on: ubuntu-latest
    needs: build-vsix
    # Passwordless publish via Microsoft Entra ID OIDC — NO long-lived PAT.
    # Binding the job to the `release` environment makes the GitHub OIDC subject
    # deterministic (repo:Nimblesite/too-many-cooks:environment:release), so ONE
    # federated credential covers every v* tag — Entra rejects tag wildcards in an
    # explicit federated subject. AZURE_CLIENT_ID / AZURE_TENANT_ID (neither
    # sensitive) live on the `release` environment / org. [SWR-SEC-TOKEN-PRIVILEGE]
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: vsix
          path: artifacts

      # Exchange the GitHub Actions OIDC token for an Entra ID session (no client
      # secret). The publisher identity has no Azure subscription role — its only
      # authorization is Marketplace publisher membership — hence
      # allow-no-subscriptions.
      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      # Mint an Azure DevOps / Marketplace-scoped Entra access token from the OIDC
      # session and hand it to vsce via VSCE_PAT (kept off argv + masked).
      # 499b84ac-1321-427f-aa17-267ca6975798 is Azure DevOps' fixed first-party app
      # id that vsce authenticates against; this explicit short-lived-token path is
      # the reliable PAT-less recipe and sidesteps the `--azure-credential` publish
      # bug (microsoft/vscode-vsce#1023). A hyphenated tag publishes --pre-release.
      # --skip-duplicate makes a re-run over an already-published version idempotent.
      - name: Publish VSIX (Entra OIDC, no PAT)
        shell: bash
        run: |
          set -euo pipefail
          flag=""
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            flag="--pre-release"
            echo "Prerelease tag ${GITHUB_REF_NAME}; publishing with --pre-release"
          fi
          VSCE_PAT="$(az account get-access-token \
            --resource 499b84ac-1321-427f-aa17-267ca6975798 \
            --query accessToken -o tsv)"
          echo "::add-mask::${VSCE_PAT}"
          export VSCE_PAT
          published=0
          shopt -s nullglob
          for vsix in artifacts/*.vsix; do
            echo "Publishing ${vsix}"
            npx --yes @vscode/vsce@3.9.2 publish --skip-duplicate ${flag} --packagePath "${vsix}"
            published=$((published + 1))
          done
          if [ "${published}" -eq 0 ]; then
            echo "::error::no VSIX artifacts found to publish"
            exit 1
          fi
          echo "Published ${published} VSIX(es) to the Marketplace"

  publish-openvsx:
    name: Publish VSIX (Open VSX)
    runs-on: ubuntu-latest
    needs: build-vsix
    # Independent of publish-marketplace: the Open VSX push (which serves the
    # VS Code forks — Cursor, Windsurf, Antigravity) must not be gated on the MS
    # Marketplace publish, and vice versa. Open VSX has no OIDC/trusted-publishing
    # path, so this uses an Open VSX token (OPEN_VSX_PAT) scoped to the release env.
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: vsix
          path: artifacts

      # ovsx is version-pinned: a floating `npx ovsx` would fetch and run the
      # latest release inside the job that holds the token — a supply-chain risk.
      # --skip-duplicate makes a re-run over an already-published version idempotent.
      - name: Publish to Open VSX Registry
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${OVSX_PAT:-}" ]; then
            echo "::error::OPEN_VSX_PAT is not set; cannot publish to Open VSX"
            exit 1
          fi
          flag=""
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            flag="--pre-release"
          fi
          published=0
          shopt -s nullglob
          for vsix in artifacts/*.vsix; do
            echo "Publishing ${vsix}"
            npx --yes ovsx@1.0.0 publish --skip-duplicate ${flag} --packagePath "${vsix}"
            published=$((published + 1))
          done
          if [ "${published}" -eq 0 ]; then
            echo "::error::no VSIX artifacts found to publish"
            exit 1
          fi
          echo "Published ${published} VSIX(es) to Open VSX"

  # Website deploys only after the CodeQL gate passes, so the live site never
  # gets ahead of an unscanned release. Stable tags only: hyphenated SemVer
  # prerelease tags (v0.14.0-rc.1, …) never overwrite the live site.
  deploy-website:
    name: Deploy Website to GitHub Pages
    runs-on: ubuntu-latest
    needs: codeql
    if: ${{ !contains(github.ref_name, '-') }}
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
