name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-lint-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            too-many-cooks/package-lock.json
            too_many_cooks_vscode_extension/package-lock.json

      # ── MCP Server ──────────────────────────────────────
      - name: Install MCP server dependencies
        working-directory: too-many-cooks
        run: npm ci

      - name: Build MCP server
        working-directory: too-many-cooks
        run: npm run build

      - name: Lint MCP server
        working-directory: too-many-cooks
        run: npm run lint

      - name: Test MCP server
        working-directory: too-many-cooks
        run: npm test

      # ── VSCode Extension ────────────────────────────────
      - name: Install extension dependencies
        working-directory: too_many_cooks_vscode_extension
        run: npm ci

      - name: Lint extension
        working-directory: too_many_cooks_vscode_extension
        run: npm run lint

      - name: Compile extension and tests
        working-directory: too_many_cooks_vscode_extension
        run: npm run pretest

      - name: Run extension tests
        uses: coactions/setup-xvfb@v1
        with:
          run: npm test
          working-directory: too_many_cooks_vscode_extension
